name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ] # Запускать при пуше в эти ветки
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Автоматическое кэширование .m2/repository

      - name: Run Maven Tests
        run: mvn test

  build:
    name: Build Artifact
    needs: test # Ждет успешного завершения тестов (аналог stages)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker:
    name: Build Docker Image
    needs: build # Ждет сборки артефакта
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # GitHub уже имеет встроенный Docker, dind не нужен

      - name: Build Docker Image
        run: docker build -t myapp .
