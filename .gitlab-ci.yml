stages:
  - test
  - build
  - docker

image: maven:3.9-eclipse-temurin-17

cache:
  paths:
    - .m2/repository

test:
  stage: test
  script:
    - mvn test

build:
  stage: build
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar

docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t myapp .